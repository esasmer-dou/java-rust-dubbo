name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.3.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, publish package, and create release
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Test
        run: mvn -B test

      - name: Verify release version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PROJECT_VERSION="$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)"
          test "$VERSION" = "$PROJECT_VERSION"

      - name: Publish Maven package
        run: mvn -B -DskipTests deploy

      - name: Prepare release assets
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-assets
          cp "target/java-rust-dubbo-${VERSION}.jar" release-assets/
          cp "target/java-rust-dubbo-${VERSION}-native-static.jar" release-assets/
          cp "target/java-rust-dubbo-${VERSION}-codegen.jar" release-assets/
          cp "target/java-rust-dubbo-${VERSION}-sources.jar" release-assets/
          (cd release-assets && sha256sum * > SHA256SUMS)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          body_path: docs/RELEASE_NOTES_v${{ steps.version.outputs.version }}.md
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
